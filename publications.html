  <main>
    <section>
      <h2>Publications</h2>
      <p>
        Publications are listed by year. DOI links point to the publication or preprint record.
      </p>
      <div id="publication-list">
        <p>Loading publications...</p>
      </div>
    </section>
  </main>

  <script>
    async function loadPublications() {
      const list = document.getElementById("publication-list");

      try {
        const response = await fetch("publications.json");
        const publications = await response.json();

        publications.sort((a, b) => b.year - a.year);

        const grouped = publications.reduce((acc, pub) => {
          if (!acc[pub.year]) acc[pub.year] = [];
          acc[pub.year].push(pub);
          return acc;
        }, {});

        list.innerHTML = "";

        Object.keys(grouped)
          .sort((a, b) => b - a)
          .forEach(year => {
            const yearHeading = document.createElement("h3");
            yearHeading.textContent = year;
            list.appendChild(yearHeading);

            grouped[year].forEach(pub => {
              const item = document.createElement("p");
              item.className = "publication-item";

              const doiLink = pub.doi
                ? `<a href="https://doi.org/${pub.doi}" target="_blank" rel="noopener noreferrer">doi:${pub.doi}</a>`
                : "";

              const status = pub.status
                ? `<span class="pub-status">${pub.status}</span>`
                : "";

              item.innerHTML = `
                ${status}
                ${pub.authors}
                <strong>${pub.title}</strong>.
                <em>${pub.journal}</em>.
                ${doiLink}
              `;

              list.appendChild(item);
            });
          });
      } catch (error) {
        list.innerHTML = "<p>Publication list could not be loaded.</p>";
      }
    }

    loadPublications();
  </script>
